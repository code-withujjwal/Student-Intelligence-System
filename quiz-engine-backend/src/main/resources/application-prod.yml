spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate # NEVER update in production
    show-sql: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: 5672

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: 6379

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000

gemini:
  api:
    key: ${GEMINI_API_KEY}

server:
  port: 8082
  forward-headers-strategy: native # Trust NGINX reverse proxy

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.quizapp: INFO
  file:
    name: /var/log/quizapp/application.log
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 10MB
