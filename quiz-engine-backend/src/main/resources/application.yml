server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://acela.proxy.rlwy.net:12278/railway
    username: root
    password: QuNmcpNQFUEtYDjiliUnyaHKQctEswsS
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # Redis is disabled — sessions stored in MySQL, caching uses in-memory (ConcurrentHashMap)
  # RedisAutoConfiguration is excluded in QuizEngineApplication.java

# P0-4 FIX: JWT properties were missing from the default profile.
# JwtService @Value("${jwt.expiration:86400000}") would get its default, but
# explicitly declaring it here makes the configuration transparent and overridable per environment.
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 604800000

# P0-4 FIX: Gemini API key was missing from the default profile entirely.
# Reads from GEMINI_API_KEY environment variable; falls back to mock_key_for_dev
# which causes GeminiService to fail gracefully and use the DB fallback challenge.
gemini:
  api:
    key: ${GEMINI_API_KEY:${VITE_GEMINI_API_KEY:mock_key_for_dev}}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always